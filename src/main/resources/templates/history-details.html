<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">

<title>History Details</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<div class="card">

<div class="card-header">

History Details

</div>

<div class="card-body">

<h5>

Story Key :

<span th:text="${history.storyKey}"></span>

</h5>

<hr>

<h4>

Generated Test Cases

</h4>

<div
th:each="tc:${history.testCases}"

class="card mt-3">

<div class="card-body">

<h5
th:text="${tc.title}">

</h5>

<p
th:text="${tc.description}">

</p>

<pre
th:text="${tc.steps}">

</pre>

<b>

Expected Result

</b>

<p
th:text="${tc.expectedResult}">

</p>

</div>

</div>

</div>

</div>

</div>

</body>

</html>
