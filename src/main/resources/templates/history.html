<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">

<title>Generation History</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

<link rel="stylesheet"
      th:href="@{/css/history.css}">

</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card shadow">

<div class="card-header bg-dark text-white">

<h3>
AI Test Case Generation History
</h3>

</div>

<div class="card-body">

<input
class="form-control mb-3"
id="searchInput"
placeholder="Search Story Key...">

<table class="table table-hover">

<thead>

<tr>

<th>ID</th>

<th>Story</th>

<th>AI Model</th>

<th>Status</th>

<th>Test Cases</th>

<th>Response</th>

<th>Date</th>

<th>Action</th>

</tr>

</thead>

<tbody id="historyTable">

<tr
th:each="history : ${historyPage.content}">

<td th:text="${history.id}"></td>

<td th:text="${history.storyKey}"></td>

<td th:text="${history.aiModel}"></td>

<td>

<span
class="badge"

th:classappend="${history.status=='SUCCESS'} ?
'bg-success' : 'bg-danger'"

th:text="${history.status}">

</span>

</td>

<td th:text="${history.testCaseCount}"></td>

<td>

<span th:text="${history.responseTimeMs}"></span>

ms

</td>

<td
th:text="${#temporals.format(history.createdAt,'dd-MMM-yyyy HH:mm')}">

</td>

<td>

<a

th:href="@{/history/{id}(id=${history.id})}"

class="btn btn-primary btn-sm">

View

</a>

<button

class="btn btn-danger btn-sm"

th:onclick="'deleteHistory('+${history.id}+')'">

Delete

</button>

</td>

</tr>

</tbody>

</table>

<nav>

<ul class="pagination justify-content-center">

<li
class="page-item"
th:classappend="${historyPage.first}?'disabled'">

<a
class="page-link"

th:href="@{/history(page=${historyPage.number-1})}">

Previous

</a>

</li>

<li
class="page-item disabled">

<span
class="page-link">

Page

<span
th:text="${historyPage.number+1}"></span>

of

<span
th:text="${historyPage.totalPages}"></span>

</span>

</li>

<li
class="page-item"
th:classappend="${historyPage.last}?'disabled'">

<a
class="page-link"

th:href="@{/history(page=${historyPage.number+1})}">

Next

</a>

</li>

</ul>

</nav>

</div>

</div>

</div>

<script th:src="@{/js/history.js}"></script>

</body>

</html>
