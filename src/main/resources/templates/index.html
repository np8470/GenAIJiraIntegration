<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>Test Case Generator</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <style>


    </style>

</head>

<body class="bg-light">

    <div class="container py-5">

        <div class="row justify-content-center">

            <div class="col-xl-9 col-lg-10">

                <div class="container mt-5 mb-5">

                    <div class="card shadow">

                        <div
                            class="card-header bg-primary text-white d-flex justify-content-between align-items-center">

                            <h3 class="mb-0">
                                Test Case Generator
                            </h3>

                            <div class="form-check form-switch">

                                <input class="form-check-input" type="checkbox" id="darkModeSwitch">

                                <label class="form-check-label text-white" for="darkModeSwitch">

                                    🌙 Dark Mode

                                </label>

                            </div>

                        </div>

                        <div class="card-body">

                            <div class="mb-3">

                                <label class="form-label">

                                    WORK ITEM ID

                                </label>

                                <input id="storyKey" class="form-control" placeholder="Example : SCRUM-5">

                            </div>

                            <div class="mb-4">

                                <label class="form-label">

                                    Generation Type

                                </label>

                                <select id="type" class="form-select">

                                    <option value="TEST_CASES">
                                        UI Test Cases
                                    </option>

                                    <option value="API_TEST_CASES">
                                        API Test Cases
                                    </option>

                                    <option value="SELENIUM_SCRIPT">
                                        Selenium Script
                                    </option>

                                </select>

                            </div>

                            <div class="text-center">

                                <button id="generateBtn" class="btn btn-primary btn-lg">

                                    Generate Test Cases

                                </button>

                            </div>

                        </div>

                    </div>


                    <div id="loadingDiv" class="text-center mt-4" style="display:none;">

                                    <div class="spinner-border text-primary"></div>

                                    <h5 class="mt-3">

                                        Generating Test Cases...

                                    </h5>

                                    <div id="uploadProgressCard" class="card mt-4" style="display:none;">

                                        <div id="uploadProgressContainer" class="mt-4" style="display:none;">

                                            <label class="form-label">

                                                Uploading Test Cases...

                                            </label>

                                            <div class="progress" style="height:28px;">

                                                <div id="uploadProgressBar"
                                                    class="progress-bar progress-bar-striped progress-bar-animated bg-primary"
                                                    style="width:0%;">

                                                    0%

                                                </div>

                                            </div>

                                        </div>

                                        <div id="uploadProgressText" class="mt-3 text-muted">

                                            Preparing upload...

                                        </div>

                                    </div>

                            </div>

                        </div>


                        <div id="uploadSummary" class="card mt-4 border-success" style="display:none;">

                            <div class="card-header bg-success text-white">
                                <h5 class="mb-0">

                                    <i class="bi bi-check-circle-fill"></i>

                                    Upload Summary

                                </h5>

                            </div>

                            <div class="card-body">

                                <div id="uploadSummaryContent">

                                </div>

                            </div>

                        </div>

                        <div id="successAlert" class="card border-success shadow mt-4"
                            style="display:none; animation:fadeIn .6s;">

                            <div class="card-header bg-success text-white">

                                <h5 class="mb-0">

                                    ✅ Upload Completed Successfully

                                </h5>

                            </div>

                            <div class="card-body">

                                <div class="row text-center">

                                    <div class="col-md-4">

                                        <h1 class="display-5 fw-bold text-success" id="uploadedCount">

                                            0

                                        </h1>

                                        <span class="text-success">
                                            ✔ Uploaded
                                        </span>

                                    </div>

                                    <div class="col-md-4">

                                        <h1 class="display-5 fw-bold text-danger" id="failedCount">

                                            0

                                        </h1>

                                        <span class="text-danger">
                                            ✖ Failed
                                        </span>

                                    </div>

                                    <div class="col-md-4">

                                        <h1 class="display-5 fw-bold text-primary" id="uploadDuration">

                                            0s

                                        </h1>

                                        Duration

                                    </div>

                                </div>

                                <hr>

                                <div id="jiraLinksContainer"></div>

                            </div>

                        </div>

                        <div id="errorAlert" class="alert alert-danger mt-4" style="display:none;">
                        </div>


                        <div class="card shadow-lg mt-4">

                            <div class="card-header">

                                <div class="row mt-4">

                                    <div class="col-md-8">

                                        <input type="text" id="searchBox" class="form-control"
                                            placeholder="Search test cases...">

                                        <div class="row mt-3 mb-3">

                                            <div class="col-md-5">



                                            </div>

                                            <div class="col-md-3">

                                                <select id="prioritySort" class="form-select">

                                                    <option value="NONE">
                                                        Sort by Priority
                                                    </option>

                                                    <option value="HIGH">
                                                        High → Medium → Low
                                                    </option>

                                                    <option value="LOW">
                                                        Low → Medium → High
                                                    </option>

                                                </select>

                                            </div>

                                            <div class="col-md-4 text-end">

                                                <span id="searchCount" class="badge bg-primary">

                                                    0 Test Cases

                                                </span>

                                            </div>

                                        </div>

                                    </div>

                                    <div class="col-md-4 text-end">

                                        <span id="searchCount" class="badge bg-primary">

                                            0 Test Cases

                                        </span>

                                    </div>

                                </div>

                                <div class="row mt-3 mb-3">

                                    <div class="col-md-6">

                                        <button class="btn btn-outline-primary btn-sm" id="expandAllBtn">

                                            📂 Expand All

                                        </button>

                                        <button class="btn btn-outline-secondary btn-sm ms-2" id="collapseAllBtn">

                                            📁 Collapse All

                                        </button>

                                    </div>

                                </div>

                                <h4 class="mb-0">

                                    Generated Test Cases

                                </h4>

                            </div>

                            <div class="card-body">

                                <div id="resultContainer" class="accordion">

                                </div>

                            </div>

                        </div>


                        <div class="text-center mt-4">

                            <button id="uploadBtn" class="btn btn-success btn-lg px-5" style="display:none;">

                                Upload Test Cases to Jira

                            </button>

                        </div>

                    </div>

                    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

                    <script src="/js/app.js"></script>
                    <script src="/js/ui.js"></script>
                    <script src="/js/generator.js"></script>
                    <script src="/js/upload.js"></script>
                    <script src="/js/theme.js"></script>

                    <div class="toast-container position-fixed top-0 end-0 p-3">

                        <div id="statusToast" class="toast" role="alert">

                            <div class="toast-header">

                                <strong class="me-auto">

                                    GenAI Jira

                                </strong>

                                <button type="button" class="btn-close" data-bs-dismiss="toast">
                                </button>

                            </div>

                            <div id="toastBody" class="toast-body">

                            </div>

                        </div>

                    </div>


                </div>

            </div>

        </div>

</body>

</html>
